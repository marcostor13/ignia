<nav class="nav"
  [class.nav--scrolled]="hasScrolled()"

  [class.nav--menu-open]="menuOpen()">

    <a routerLink="/" class="nav__logo">

        <div class="nav__dropdown">
          <a routerLink="/servicios/plataformas-web" class="nav__dropdown-item">

              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="14" rx="2"/>
                <path d="M8 20h8M12 18v2"/>

            </span>
            <span>
              <strong>Plataformas Web</strong>
              <small>Apps y sitios a medida</small>

          <a routerLink="/servicios/consultoria-ti" class="nav__dropdown-item">

                <path d="M12 2l2 5h5l-4 3 1.5 5L12 12l-4.5 3L9 10 5 7h5z"/>
              </svg>
            </span>
            <span>
              <strong>Consultoría & IA</strong>
              <small>Estrategia y transformación digital</small>
            </span>
          </a>
          <a routerLink="/servicios/automatizacion" class="nav__dropdown-item">
            <span class="nav__dropdown-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 12a8 8 0 018-8V2"/>
                <path d="M20 12a8 8 0 01-8 8v2"/>
                <path d="M12 2l-2 2 2 2"/>
                <path d="M12 22l2-2-2-2"/>
              </svg>
            </span>
            <span>
              <strong>Automatización</strong>
              <small>Procesos eficientes a escala</small>
            </span>
          </a>

        <a routerLink="/proyectos" class="nav__link" routerLinkActive="nav__link--active">Proyectos</a>
      </li>

    <!-- Right actions -->
    <div class="nav__right">
      <a href="mailto:admin@ignia.site" class="nav__action">admin@ignia.site</a>
      <a href="https://outlook.office.com/bookwithme/user/a9497d377a0445eea242b5cb788396bd@ignia.site/meetingtype/Eimuu4q_r0-V7IA3PC_42w2?anonymous&ismsaljsauthenabled&ep=mlink" target="_blank" rel="noopener noreferrer" class="btn-nav">
        Agendar
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M5 12h14M12 5l7 7-7 7"/>

      </a>
    </div>

    <button class="nav__burger" (click)="toggleMenu()" [class.open]="menuOpen()">
      <span></span><span></span><span></span>

  </div>

  <!-- Mobile menu -->
  @if (menuOpen()) {
    <div class="nav__mobile">
      <a routerLink="/servicios/plataformas-web" class="nav__mobile-link" (click)="menuOpen.set(false)">Plataformas Web</a>
      <a routerLink="/servicios/consultoria-ti" class="nav__mobile-link" (click)="menuOpen.set(false)">Consultoría & IA</a>
      <a routerLink="/servicios/automatizacion" class="nav__mobile-link" (click)="menuOpen.set(false)">Automatización</a>
      <a routerLink="/proyectos" class="nav__mobile-link" (click)="menuOpen.set(false)">Proyectos</a>
