[build]
  command = "npm install && cd apps/frontend && npm ci && npm run build"
  publish = "apps/frontend/dist/frontend/browser"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# SPA fallback — all other routes go to Angular's index.html
# Note: /api/* routes are handled by Netlify Functions v2 (config.path)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
